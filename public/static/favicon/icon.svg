<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- chopsticks lifting noodles, extending to the right -->
  <g>
    <rect x="300" y="42" width="212" height="24" rx="12" fill="#c9302a"/>
    <rect x="300" y="78" width="212" height="24" rx="12" fill="#e8442f"/>
  </g>

  <!-- lifted noodle bundle -->
  <rect x="164" y="34" width="184" height="216" rx="28" fill="#f8a61b"/>
  <g stroke="#ef8c1a" stroke-width="12" stroke-linecap="round" fill="none">
    <line x1="198" y1="62" x2="198" y2="232"/>
    <line x1="236" y1="52" x2="236" y2="238"/>
    <line x1="274" y1="52" x2="274" y2="238"/>
    <line x1="312" y1="62" x2="312" y2="232"/>
  </g>

  <!-- toppings peeking over the rim -->
  <!-- chashu (left) -->
  <circle cx="88" cy="226" r="46" fill="#c08145"/>
  <circle cx="88" cy="226" r="30" fill="#d49d63"/>
  <!-- naruto (left-center) -->
  <circle cx="150" cy="218" r="42" fill="#f4e9e2"/>
  <path d="M152 220 a9 9 0 0 1 -9 9 a16 16 0 0 1 -7 -30 a25 25 0 0 1 30 14" stroke="#eb6f63" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- negi (right) -->
  <circle cx="372" cy="224" r="34" fill="#69a35d"/>
  <circle cx="372" cy="224" r="18" fill="#dbe8d6"/>
  <circle cx="424" cy="232" r="28" fill="#7fb86f"/>
  <circle cx="424" cy="232" r="14" fill="#e3eedd"/>

  <!-- bowl -->
  <path d="M20 244 H492 A236 204 0 0 1 256 448 A236 204 0 0 1 20 244 Z" fill="#e8442f"/>
  <!-- bowl shading -->
  <path d="M77 380 A236 204 0 0 0 435 380 A300 140 0 0 1 77 380 Z" fill="#d8342b"/>
  <!-- bowl foot -->
  <path d="M192 446 h128 v22 a12 12 0 0 1 -12 12 h-104 a12 12 0 0 1 -12 -12 Z" fill="#d8342b"/>
</svg>
